server:
  port: 8080

spring:
  application:
    name: parrot-server
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/parrot_management?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: 请改成自己的数据库密码
    hikari:
      initialization-fail-timeout: 0
      connection-timeout: 3000
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB
  sql:
    init:
      mode: never

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    banner: false

parrot:
  jwt:
    # 演示项目可以先用固定值，正式部署时建议改成更长的随机字符串。
    secret: 请改成至少32位的JWT密钥字符串
    expire-hours: 24
  upload:
    # Windows 示例：E:/project/parrot-management-system/upload
    # macOS 或 Linux 示例：/Users/yourname/parrot-management-system/upload
    save-path: 请改成自己的上传文件保存目录
    access-prefix: /upload
